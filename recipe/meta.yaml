{% set name = "OSMPythonTools" %}
{% set version = "0.3.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | lower }}-{{ version }}.tar.gz
  sha256: dc104994148c699606b55243ebd681f378c6b41359f10ba2f5b9f977485f3a00

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.7
    - pip
  run:
    - python >=3.7
    - beautifulsoup4
    - geojson
    - lxml
    - matplotlib-base
    - numpy
    - pandas
    - ujson
    - xarray

test:
  imports:
    - OSMPythonTools
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/mocnik-science/osm-python-tools
  summary: A library to access OpenStreetMap related services.
  license: GPL-2.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rosepearson
    - mocnik-science
